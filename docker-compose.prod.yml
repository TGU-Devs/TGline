services:
    db:
        image: postgres:15
        env_file:
            - .env
        environment:
            POSTGRES_HOST_AUTH_METHOD: md5
        restart: unless-stopped
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - "3001:3000"
        env_file:
            - .env
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:3000/up || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        env_file:
            - .env
        restart: unless-stopped
        depends_on:
            - backend
        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

volumes:
    db_data:
