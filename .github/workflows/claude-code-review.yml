name: Claude Code Review

on:
  workflow_dispatch: # 手動実行のみ（自動トリガー無効）

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            prompts/agents/pr-reviewer.md の内容に従って、このPRの差分をレビューしてください。
            レビュー結果は pr-reviewer.md で定義された出力フォーマットに従い、PRコメントとして投稿してください。

