# GitHub Actionsの表示名（PRのチェック欄に出る名前）
name: CI - Frontend Build Check

# PRが作成 or 更新された時に発火
on:
  pull_request:
    # frontend/ 配下のファイルに変更がある場合のみ実行（バックエンドだけの変更ではスキップ）
    paths:
      - "frontend/**"

jobs:
  build:
    # GitHub提供のLinuxマシン上で実行
    runs-on: ubuntu-latest
    defaults:
      run:
        # 全ての run コマンドを frontend/ ディレクトリ内で実行
        working-directory: frontend

    steps:
      # リポジトリのコードをマシンにクローン
      - uses: actions/checkout@v4

      # Node.js環境をセットアップ
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # macOSで生成されたpackage-lock.jsonにはLinux用ネイティブバイナリ
      # (lightningcss, @next/swc等)の解決情報が含まれないため、
      # lockfileを削除してからnpm installで依存を解決する
      - run: rm -f package-lock.json && npm install

      # next build を実行。型エラーがあればここで失敗 → PRに赤バツが付く
      - run: npm run build
        env: # CIではビルドが通るかだけ確認したいので環境変数はダミーで設定
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: dummy
          NEXT_PUBLIC_API_URL: http://localhost:3000
